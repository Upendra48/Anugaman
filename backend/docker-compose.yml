services:
  backend:
    build: .
    container_name: django_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: